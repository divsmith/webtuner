name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish to gh-pages
        run: |
          git fetch origin gh-pages
          rm -rf /tmp/webtuner-pages
          git worktree add /tmp/webtuner-pages gh-pages

          rm -rf /tmp/webtuner-pages/*
          cp index.html /tmp/webtuner-pages/
          cp manifest.json /tmp/webtuner-pages/
          cp sw.js /tmp/webtuner-pages/
          cp -R css /tmp/webtuner-pages/css
          cp -R js /tmp/webtuner-pages/js
          cp -R icons /tmp/webtuner-pages/icons
          touch /tmp/webtuner-pages/.nojekyll

          cd /tmp/webtuner-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Deploy GitHub Pages"
          git push origin gh-pages
